services:
  postgres:
    image: postgres:16-alpine
    container_name: code-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: code_connect
      POSTGRES_PASSWORD: code_connect
      POSTGRES_DB: code_connect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U code_connect -d code_connect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
